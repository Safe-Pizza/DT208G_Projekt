<h2>Kurser</h2>
<input 
    type="text" 
    id="search" 
    placeholder="Sök efter kurs..." 
    [value]="searchInput()"
    (input)="searchInput.set($any($event.target).value)"
    >
<select>
</select>

<table>
    <thead>
        <tr>
            <th>Kurskod</th>
            <th>Kursnamn</th>
            <th>Poäng</th>
            <th>Ämne</th>
            <th>Kursplan</th>
            <th>Lägg till</th>
        </tr>
    </thead>
    <tbody>
        @for (course of coursesFiltered(); track course.courseCode) {
        <tr>
            <td>{{ course.courseCode }}</td>
            <td>{{ course.courseName }}</td>
            <td>{{ course.points }}</td>
            <td>{{ course.subject }}</td>
            <td><a href="{{ course.syllabus }}" traget="_blank"><mat-icon>open_in_new</mat-icon></a></td>
            <td><button>Lägg till</button></td>
        </tr>
        }

    </tbody>
</table>
