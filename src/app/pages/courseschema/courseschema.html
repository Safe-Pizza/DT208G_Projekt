<h2>Ramschema</h2>

<table>
    <thead>
        <tr>
            <th>Kurskod</th>
            <th>Kursnamn</th>
            <th>Poäng</th>
            <th>Ämne</th>
            <th>Kursplan</th>
            <th class="nobr">Lägg till</th>
        </tr>
    </thead>
    <tbody>

        @for (course of courses; track $index;) {
        <tr>
            <td>{{ course.courseCode }}</td>
            <td>{{ course.courseName }}</td>
            <td>{{ course.points }}</td>
            <td>{{ course.subject }}</td>
            <td><a href="{{ course.syllabus }}" traget="_blank"><mat-icon>open_in_new</mat-icon></a></td>
            <td><button (click)="courseschemaService.removeFromLocalStorage($index)" class="nobr">Ta bort</button></td>
        </tr>
        }

    </tbody>
    <tfoot>Total poäng: {{ points }}</tfoot>
</table>
