<h2>Ramschema</h2>

<table>
    <thead>
        <tr>
            <th>Kurskod</th>
            <th>Kursnamn</th>
            <th>Poäng</th>
            <th>Ämne</th>
            <th>Kursplan</th>
            <th class="nobr">Ta bort</th>
        </tr>
    </thead>
    <tbody>
        @for (course of courses; track $index;) {
        <tr>
            <td data-title="Kurskod">{{ course.courseCode }}</td>
            <td data-title="Kursnamn">{{ course.courseName }}</td>
            <td data-title="Poäng">{{ course.points }}</td>
            <td data-title="Ämne">{{ course.subject }}</td>
            <td data-title="Kursplan"><a href="{{ course.syllabus }}" traget="_blank"><mat-icon>open_in_new</mat-icon></a></td>
            <td><button (click)="courseschemaService.removeFromLocalStorage($index); getCourses()" class="nobr">Ta
                    bort</button></td>
        </tr>
        }
    </tbody>
    <tfoot><tr><td colspan="3">Total poäng: <strong>{{ points }}</strong></td></tr></tfoot>
</table>
